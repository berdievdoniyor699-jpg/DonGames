<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebGames MVP</title>
    <style>
      body {
        margin: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background-color: #333;
        font-family: sans-serif;
      }
      #ui {
        margin-bottom: 20px;
      }
      button {
        padding: 10px 20px;
        font-size: 16px;
        margin: 0 10px;
        cursor: pointer;
        background: #4CAF50;
        color: white;
        border: none;
        border-radius: 5px;
        transition: background 0.2s;
      }
      button:hover {
        background: #45a049;
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      #game-container {
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        width: 800px;
        height: 600px;
        background: #000;
      }
      
      /* Стили для магазина */
      #shop-modal {
        display: none; 
        position: fixed; 
        top: 50%; 
        left: 50%; 
        transform: translate(-50%, -50%); 
        background: #fff; 
        padding: 20px; 
        border-radius: 10px; 
        box-shadow: 0 0 20px rgba(0,0,0,0.8); 
        z-index: 1000; 
        text-align: center; 
        width: 450px; 
        color: #000;
      }
      .skin-card {
        background: #f1f1f1;
        padding: 15px;
        border-radius: 8px;
        width: 110px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .skin-card h3 { margin: 0 0 5px 0; font-size: 18px; }
      .skin-card p { margin: 0 0 15px 0; font-size: 14px; color: #555; }
      .skin-card button { margin: 0; width: 100%; padding: 8px 5px; font-size: 14px; }
    </style>
  </head>
  <body>
    <div id="ui">
      <button id="btn-mario">Играть в Mario</button>
      <button id="btn-birds">Играть в Angry Birds</button>
      <button id="btn-shop" style="background: #ff9800;">Магазин скинов</button>
    </div>
    
    <!-- Модальное окно магазина -->
    <div id="shop-modal">
      <h2>Магазин Скинов</h2>
      <p style="font-size: 18px;">У вас монет: <strong id="shop-coins">0</strong></p>
      
      <div style="display: flex; justify-content: space-around; margin-top: 20px; gap: 10px;">
        <div class="skin-card">
          <h3>Марио</h3>
          <p>Бесплатно</p>
          <button class="btn-buy-skin" data-skin="player_mario" data-price="0">Выбрать</button>
        </div>
        <div class="skin-card">
          <h3>Луиджи</h3>
          <p>10 монет</p>
          <button class="btn-buy-skin" data-skin="player_luigi" data-price="10">Купить</button>
        </div>
        <div class="skin-card">
          <h3>Варио</h3>
          <p>20 монет</p>
          <button class="btn-buy-skin" data-skin="player_wario" data-price="20">Купить</button>
        </div>
      </div>
      <br><br>
      <button id="btn-close-shop" style="background: #f44336;">Закрыть магазин</button>
    </div>

    <div id="game-container"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
